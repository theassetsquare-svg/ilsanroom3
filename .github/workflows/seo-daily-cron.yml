name: SEO Daily Cron — sitemap lastmod + IndexNow

on:
  schedule:
    - cron: '0 3 * * *'  # KST 12:00 (UTC+9 → UTC 03:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update sitemap lastmod to today (KST)
        run: |
          TODAY_KST=$(TZ=Asia/Seoul date +%Y-%m-%d)
          echo "Today (KST): $TODAY_KST"
          sed -i -E "s|<lastmod>[0-9]{4}-[0-9]{2}-[0-9]{2}</lastmod>|<lastmod>${TODAY_KST}</lastmod>|g" sitemap.xml
          cat sitemap.xml

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet sitemap.xml; then
            echo "No sitemap changes"
          else
            git add sitemap.xml
            git commit -m "chore(sitemap): daily lastmod refresh ($(TZ=Asia/Seoul date +%Y-%m-%d))"
            git push
          fi

      - name: Ping Google sitemap
        run: |
          curl -sf "https://www.google.com/ping?sitemap=https://ilsanroom3.pages.dev/sitemap.xml" || true

      - name: Ping Bing sitemap
        run: |
          curl -sf "https://www.bing.com/ping?sitemap=https://ilsanroom3.pages.dev/sitemap.xml" || true

      - name: IndexNow (Bing/Yandex/Naver)
        run: |
          # Submit URL list to IndexNow
          KEY="ilsanroom3pages2026"
          curl -sf -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{
              \"host\": \"ilsanroom3.pages.dev\",
              \"key\": \"$KEY\",
              \"keyLocation\": \"https://ilsanroom3.pages.dev/$KEY.txt\",
              \"urlList\": [
                \"https://ilsanroom3.pages.dev/\",
                \"https://ilsanroom3.pages.dev/legal/\"
              ]
            }" || true
